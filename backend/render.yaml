services:
  - type: web
    name: leadgen-ai-api
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: |
      pip install -r requirements.txt
      apt-get update -qq && apt-get install -y ffmpeg fonts-dejavu-core
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_API_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AGENCY_HANDLE
        sync: false
      - key: AGENCY_BOOKING_LINK
        sync: false
    healthCheckPath: /health
